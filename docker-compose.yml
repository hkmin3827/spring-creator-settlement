services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: creator_settlement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creator_settlement"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://db:5432/creator_settlement
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      COMMISSION_RATE: "0.20"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
